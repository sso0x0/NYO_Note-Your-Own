spring:
  application:
    name: nyo
  datasource:
    url: jdbc:oracle:thin:@localhost:1521/XE
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
    show-sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  elasticsearch: # 엘라스틱서치
    uris: ${ELASTICSEARCH_URI}

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /docs

openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4o-mini

gcp:
  storage:
    bucket: nyo_images

jwt:
  secret: ${JWT_SECRET}
  access-token-validity-ms: 3600000 # 1시간

app:
  cors:
    # 개발 환경에서 환경변수가 없어도 서버가 시작되도록 로컬 프론트 주소를 기본값으로 사용합니다.
    # 배포 환경에서는 CORS_ALLOWED_ORIGINS 값으로 반드시 실제 프론트 주소를 지정해야 합니다.
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  oauth2:
    redirect-uri: http://localhost:5173/oauth2/redirect
