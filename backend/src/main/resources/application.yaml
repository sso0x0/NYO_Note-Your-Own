spring:
  application:
    name: nyo

  datasource:
    url: jdbc:oracle:thin:@localhost:1521/XE
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
    show-sql: true
  # 💡 추가: 구글 OAuth2 로그인용 (client-id/secret은 Google Cloud Console에서 발급)
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /docs

# AI 자동 태깅 / RAG 챗봇용 (장예지 파트)
# .env에 OPENAI_API_KEY 추가 필요. 키가 없어도 앱 실행은 되고, AI API 호출 시에만 실패합니다.
openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4o-mini

gcp:
  storage:
    bucket: nyo_images
    # 💡 FIXED: 여기 안에 jwt가 잘못 중첩되어 있던 걸 최상위로 빼냄

# 💡 FIXED: gcp.storage 밑에 잘못 들어가 있던 걸 최상위 레벨로 이동
jwt:
  secret: "여기에-최소-32바이트-이상의-랜덤한-시크릿-문자열을-넣어주세요"
  access-token-validity-ms: 3600000 # 1시간

# 💡 추가: 구글 로그인 성공 후 프론트로 리다이렉트할 주소 (프론트 담당자와 확인 필요)
app:
  oauth2:
    redirect-uri: http://localhost:3000/oauth2/redirect